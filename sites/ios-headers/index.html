<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iOS Headers</title>
    <link rel="stylesheet" href="./assets/app.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>iOS Headers</h1>
        <p class="subtitle">Cross-version header search, diff, and symbol existence checks.</p>
      </header>

      <section class="card">
        <h2>Path Search</h2>
        <form id="path-search-form">
          <input id="path-query" type="text" placeholder="e.g. /usr/libexec/nfcd/NFDriverWrapper.h" required />
          <button type="submit">Search</button>
        </form>
        <ul id="path-results"></ul>
      </section>

      <section class="card">
        <h2>Path Detail & Diff</h2>
        <p id="selected-path">Selected path: -</p>
        <div class="row">
          <label>
            Base
            <select id="base-version"></select>
          </label>
          <label>
            Target
            <select id="target-version"></select>
          </label>
          <button id="run-diff" type="button">Run Diff</button>
        </div>
        <pre id="diff-output"></pre>
      </section>

      <section class="card">
        <h2>Symbol Existence</h2>
        <p>Pick a symbol from the selected path and version.</p>
        <div class="row">
          <label>
            Version
            <select id="symbol-version"></select>
          </label>
          <button id="load-symbols" type="button">Load Symbols</button>
        </div>
        <div class="row">
          <label>
            Symbol
            <select id="symbol-select"></select>
          </label>
          <button id="check-symbol" type="button">Check Across Versions</button>
        </div>
        <pre id="symbol-output"></pre>
      </section>
    </main>

    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
